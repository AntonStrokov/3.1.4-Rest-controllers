<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="card shadow p-5">
                <h1 class="text-danger display-1">Oops!</h1>
                <h3 class="mb-4">Something went wrong</h3>
                <p class="text-muted" th:text="${message}">Error description here</p>
                <div class="mt-4">
                    <!-- Эта кнопка сработает ВСЕГДА, так как /login разрешен всем -->
                    <a th:href="@{/login}" class="btn btn-primary">Back to Login</a>

                    <!-- Эти кнопки появятся только если ты УЖЕ вошел в систему -->
                    <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')" class="btn btn-outline-secondary">To Admin Panel</a>
                    <a th:href="@{/user}" sec:authorize="isAuthenticated()" class="btn btn-outline-secondary">To My Profile</a>
                </div>


            </div>
        </div>
    </div>
</div>
</body>
</html>
