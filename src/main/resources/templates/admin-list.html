<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; margin: 0; }
        .sidebar { width: 240px; background-color: #ffffff; min-height: calc(100vh - 56px); border-right: 1px solid #dee2e6; }
        .sidebar .list-group-item { border: none; border-radius: 0.25rem; margin: 5px 10px; color: #0d6efd; }
        .sidebar .list-group-item.active { background-color: #0d6efd; color: #ffffff; }
        .content { flex-grow: 1; padding: 20px 30px; }
        .card-header { background-color: #f7f7f7; font-weight: bold; font-size: 1.2rem; }
        .centered-form-container { width: 300px; margin: 0 auto; text-align: center; }
        .form-label { font-weight: bold; margin-top: 10px; margin-bottom: 2px; display: block; }
        .nav-tabs .nav-link { border-radius: 0.375rem 0.375rem 0 0; }
        .tab-content { border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 0.375rem 0.375rem; }
    </style>
</head>
<body>

<div class="bg-dark p-2 d-flex justify-content-between align-items-center shadow">
    <span class="fw-bold fs-5 text-white px-3">
        <span th:text="${currentUser.email}">admin@mail.ru</span>
        <span class="fw-normal text-secondary">with roles:</span>
        <span class="fw-normal" th:each="role : ${currentUser.roles}"
              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">ADMIN</span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <button class="btn btn-link text-secondary text-decoration-none" type="submit">Logout</button>
    </form>
</div>

<div class="d-flex">
    <div class="sidebar shadow-sm">
        <div class="list-group list-group-flush mt-3">
            <a class="list-group-item list-group-item-action active" th:href="@{/admin}">Admin</a>
            <a class="list-group-item list-group-item-action" th:href="@{/user}">User</a>
        </div>
    </div>

    <div class="content">
        <h1 class="fw-bold">Admin panel</h1>

        <ul class="nav nav-tabs mt-3" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#usersTable"
                        type="button" role="tab">Users table</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#newUserTab"
                        type="button" role="tab">New User</button>
            </li>
        </ul>

        <div class="tab-content border rounded-bottom bg-white shadow-sm">

            <div class="tab-pane fade show active" id="usersTable" role="tabpanel">
                <div class="card-header border-bottom p-3">All users</div>
                <div class="p-4">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">First Name</th>
                            <th class="text-center">Last Name</th>
                            <th class="text-center">Age</th>
                            <th class="text-center">Email</th>
                            <th class="text-center">Role</th>
                            <th class="text-center">Edit</th>
                            <th class="text-center">Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td class="text-center" th:text="${user.id}"></td>
                            <td class="text-center" th:text="${user.name}"></td>
                            <td class="text-center" th:text="${user.lastName}"></td>
                            <td class="text-center" th:text="${user.age}"></td>
                            <td class="text-center" th:text="${user.email}"></td>
                            <td class="text-center">
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-info btn-sm text-white" data-bs-toggle="modal"
                                        th:data-bs-target="'#editModal' + ${user.id}">Edit</button>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-danger btn-sm" data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteModal' + ${user.id}">Delete</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="newUserTab" role="tabpanel">
                <div class="card-header border-bottom p-3">Add new user</div>
                <div class="p-5 d-flex justify-content-center bg-white">
                    <div class="centered-form-container">
                        <form th:action="@{/admin/add}" th:object="${newUser}" method="post" autocomplete="off">

                            <input type="text" name="prevent_autofill" style="display:none;" tabindex="-1">
                            <input type="password" name="password_fake" style="display:none;" tabindex="-1">

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control text-center" th:field="*{name}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{name}"></div>

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control text-center" th:field="*{lastName}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{lastName}"></div>

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control text-center" th:field="*{age}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{age}"></div>

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control text-center"
                                   th:field="*{email}"
                                   th:errorclass="is-invalid"
                                   autocomplete="one-time-code"
                                   onfocus="this.removeAttribute('readonly');" readonly>
                            <div class="invalid-feedback" th:errors="*{email}"></div>

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control text-center" th:field="*{password}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{password}"></div>

                            <label class="form-label">Role</label>
                            <select class="form-select text-center" name="roleIds" multiple size="2"
                                    th:classappend="${#fields.hasErrors('roles')} ? 'is-invalid' : ''">
                                <option th:each="role : ${allRoles}" th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{roles}"></div>

                            <button type="submit" class="btn btn-success btn-lg mt-4 px-4 fw-bold">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:each="user : ${users}">
    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-center">
                <div class="modal-header text-start">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/update}" method="post">
                    <div class="modal-body">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label>
                            <input type="text" class="form-control bg-light" name="id" th:value="${user.id}" readonly>

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control" name="name" th:value="${user.name}">

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control" name="lastName" th:value="${user.lastName}">

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" name="age" th:value="${user.age}">

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" th:value="${user.email}">

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Leave blank to keep old">

                            <label class="form-label">Role</label>
                            <select class="form-select" name="roleIds" multiple size="2">
                                <option th:each="role : ${allRoles}" th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                                        th:selected="${user.roles.contains(role)}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-center">
                <div class="modal-header text-start">
                    <h5 class="modal-title">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" name="id" th:value="${user.id}">
                    <div class="modal-body">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label>
                            <input type="text" class="form-control bg-light" th:value="${user.id}" disabled>
                            <label class="form-label">First name</label>
                            <input type="text" class="form-control bg-light" th:value="${user.name}" disabled>
                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control bg-light" th:value="${user.lastName}" disabled>
                            <label class="form-label">Age</label>
                            <input type="text" class="form-control bg-light" th:value="${user.age}" disabled>
                            <label class="form-label">Email</label>
                            <input type="text" class="form-control bg-light" th:value="${user.email}" disabled>
                            <label class="form-label">Role</label>
                            <select class="form-select bg-light" multiple disabled size="2">
                                <option th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Логика переключения на вкладку "New User" при ошибках валидации
        const activeTab = [[${activeTab}]];
        if (activeTab === 'newuser') {
            // Ищем кнопку-переключатель по ID
            const tabTriggerEl = document.querySelector('#new-user-tab');
            if (tabTriggerEl) {
                const tab = new bootstrap.Tab(tabTriggerEl);
                tab.show();
            }
        }

        // 2. Радикальная очистка автозаполнения (Email/Password)
        // Браузеры подставляют данные через 100-500мс после загрузки, поэтому используем задержку
        setTimeout(function() {
            const newUserForm = document.querySelector('#newUserTab form');
            if (newUserForm && activeTab !== 'newuser') {
                // Очищаем только если это первая загрузка (нет ошибок валидации)
                const inputs = newUserForm.querySelectorAll('input:not([type="hidden"])');
                inputs.forEach(input => {
                    input.value = '';
                    // Снимаем розовый/желтый фон автозаполнения Chrome
                    input.defaultValue = '';
                });
            }
        }, 100);

        // 3. Дополнительная защита: очистка при ручном клике на вкладку "New User"
        const newUserTabButton = document.querySelector('#new-user-tab');
        if (newUserTabButton) {
            newUserTabButton.addEventListener('shown.bs.tab', function () {
                // Если ошибок нет (нет класса is-invalid), очищаем форму при открытии
                if (!document.querySelector('.is-invalid')) {
                    const form = document.querySelector('#newUserTab form');
                    if (form) form.reset();
                }
            });
        }
    });
</script>

</body>
</html>
