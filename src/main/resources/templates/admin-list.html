<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; margin: 0; }
        .sidebar { width: 240px; background-color: #ffffff; min-height: calc(100vh - 56px); border-right: 1px solid #dee2e6; }
        .sidebar .list-group-item { border: none; border-radius: 0.25rem; margin: 5px 10px; color: #0d6efd; }
        .sidebar .list-group-item.active { background-color: #0d6efd; color: #ffffff; }
        .content { flex-grow: 1; padding: 20px 30px; }
        .card-header { background-color: #f7f7f7; font-weight: bold; font-size: 1.2rem; }
        .centered-form-container { width: 300px; margin: 0 auto; text-align: center; }
        .form-label { font-weight: bold; margin-top: 10px; margin-bottom: 2px; display: block; }
        .nav-tabs .nav-link { border-radius: 0.375rem 0.375rem 0 0; }
        .tab-content { border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 0.375rem 0.375rem; }
    </style>
</head>
<body>

<div class="bg-dark p-2 d-flex justify-content-between align-items-center shadow">
    <span class="fw-bold fs-5 text-white px-3">
        <span th:text="${currentUser.email}">admin@mail.ru</span>
        <span class="fw-normal text-secondary">with roles:</span>
        <span class="fw-normal" th:each="role : ${currentUser.roles}"
              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">ADMIN</span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-link text-secondary text-decoration-none" type="submit">Logout</button>
    </form>
</div>

<div class="d-flex">
    <div class="sidebar">
        <div class="list-group list-group-flush mt-3">
            <a class="list-group-item list-group-item-action active" th:href="@{/admin}">Admin</a>
            <a class="list-group-item list-group-item-action" th:href="@{/user}">User</a>
        </div>
    </div>

    <div class="content">
        <h1 class="fw-bold">Admin panel</h1>

        <ul class="nav nav-tabs mt-3" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#usersTable"
                        type="button" role="tab">Users table</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#newUser"
                        type="button" role="tab">New User</button>
            </li>
        </ul>

        <div class="tab-content border rounded-bottom bg-white shadow-sm">
            <div class="tab-pane fade show active" id="usersTable" role="tabpanel" aria-labelledby="table-tab">
                <div class="card-header border-bottom p-3">All users</div>
                <div class="p-4">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">First Name</th>
                            <th class="text-center">Last Name</th>
                            <th class="text-center">Age</th>
                            <th class="text-center">Email</th>
                            <th class="text-center">Role</th>
                            <th class="text-center">Edit</th>
                            <th class="text-center">Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td class="text-center" th:text="${user.id}"></td>
                            <td class="text-center" th:text="${user.name}"></td>
                            <td class="text-center" th:text="${user.lastName}"></td>
                            <td class="text-center" th:text="${user.age}"></td>
                            <td class="text-center" th:text="${user.email}"></td>
                            <td class="text-center">
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-info btn-sm text-white" data-bs-toggle="modal"
                                        th:data-bs-target="'#editModal' + ${user.id}">Edit</button>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-danger btn-sm" data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteModal' + ${user.id}">Delete</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="newUser" role="tabpanel" aria-labelledby="new-user-tab">
                <div class="card-header border-bottom p-3">Add new user</div>
                <div class="p-5 d-flex justify-content-center bg-white">
                    <div class="centered-form-container">
                        <form th:action="@{/admin/add}" th:object="${newUser}" method="post" autocomplete="off">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <input type="text" name="fake_user" style="display:none;">
                            <input type="password" name="fake_pass" style="display:none;">

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control text-center"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control text-center" th:field="*{lastName}" placeholder="Last name">

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control text-center" th:field="*{age}" value="">

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control text-center" th:field="*{email}"
                                   placeholder="Email" autocomplete="username">

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control text-center" th:field="*{password}"
                                   placeholder="Password" autocomplete="new-password">

                            <label class="form-label">Role</label>
                            <select class="form-select text-center" name="roleIds" multiple size="2">
                                <option th:each="role : ${allRoles}" th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                            </select>

                            <button type="submit" class="btn btn-success btn-lg mt-4 px-4 fw-bold">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:each="user : ${users}">
    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/update}" method="post" autocomplete="off">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="modal-body">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label>
                            <input type="text" class="form-control bg-light text-center" name="id" th:value="${user.id}" readonly>

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control text-center" name="name" th:value="${user.name}">

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control text-center" name="lastName" th:value="${user.lastName}">

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control text-center" name="age" th:value="${user.age}">

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control text-center" name="email" th:value="${user.email}" autocomplete="username">

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control text-center" name="password"
                                   placeholder="New password" autocomplete="new-password">

                            <label class="form-label">Role</label>
                            <select class="form-select text-center" name="roleIds" multiple size="2">
                                <option th:each="role : ${allRoles}" th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                                        th:selected="${user.roles.contains(role)}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-center">
                <div class="modal-header">
                    <h5 class="modal-title">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" th:value="${user.id}">
                    <div class="modal-body d-flex flex-column align-items-center">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label>
                            <input type="text" class="form-control bg-light text-center" th:value="${user.id}" disabled>
                            <label class="form-label">First name</label>
                            <input type="text" class="form-control bg-light text-center" th:value="${user.name}" disabled>
                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control bg-light text-center" th:value="${user.lastName}" disabled>
                            <label class="form-label">Age</label>
                            <input type="text" class="form-control bg-light text-center" th:value="${user.age}" disabled>
                            <label class="form-label">Email</label>
                            <input type="text" class="form-control bg-light text-center" th:value="${user.email}" disabled>
                            <label class="form-label">Role</label>
                            <select class="form-select bg-light text-center" multiple disabled size="2">
                                <option th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${activeTab == 'newuser'}">
    document.addEventListener('DOMContentLoaded', function() {
        const newUserTab = document.querySelector('#new-user-tab');
        if (newUserTab) { new bootstrap.Tab(newUserTab).show(); }
    });
</script>

</body>
</html>
