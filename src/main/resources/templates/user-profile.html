<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 text-center">
                <div class="card-body p-5">
                    <div class="mb-4 text-primary">
                        <svg xmlns="http://www.w3.org" width="64" height="64" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                        </svg>
                    </div>
                    <h2 class="fw-bold" th:text="'Hello, ' + ${user.name} + '!'"></h2>
                    <hr>
                    <p class="text-muted mb-1">Email</p>
                    <p class="h5 mb-3" th:text="${user.email}"></p>
                    <p class="text-muted mb-1">Age</p>
                    <p class="h5 mb-4" th:text="${user.age}"></p>

                    <form th:action="@{/logout}" method="POST">
                        <button class="btn btn-outline-danger w-100" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
