<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User page</title>
    <!-- Правильное подключение Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
            margin: 0;
        }
        .sidebar {
            width: 240px;
            background-color: #ffffff;
            min-height: calc(100vh - 56px);
            border-right: 1px solid #dee2e6;
        }
        .sidebar .list-group-item {
            border: none;
            border-radius: 0.25rem;
            margin: 5px 0;
            color: #0d6efd;
            padding-left: 20px;
        }
        .sidebar .list-group-item.active {
            background-color: #0d6efd;
            color: #ffffff;
            border-radius: 0.25rem;
        }
        .content {
            flex-grow: 1;
            padding: 20px 30px;
        }
        .card-header {
            background-color: #f7f7f7;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .navbar-brand {
            font-size: 1.1rem;
        }
        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .table td, .table th {
            padding: 12px 15px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<!-- Шапка -->
<nav class="navbar navbar-dark bg-dark sticky-top p-0 shadow">
    <div class="container-fluid">
        <span class="navbar-brand d-flex align-items-center px-3" style="height: 50px;">
            <strong th:text="${currentUser.email}">user@mail.ru</strong>
            <span class="text-secondary ms-2">with roles:</span>
            <span class="ms-2 text-white" th:each="role : ${currentUser.roles}"
                  th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">USER</span>
        </span>
        <form th:action="@{/logout}" method="POST" class="m-0">
            <!-- CSRF токен для формы logout -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-link text-secondary text-decoration-none px-3" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="d-flex">
    <!-- Боковое меню -->
    <div class="sidebar">
        <div class="list-group list-group-flush mt-3 px-2">
            <!-- Ссылка на админ-панель для администраторов -->
            <a th:if="${#lists.contains(currentUser.roles.![name], 'ROLE_ADMIN')}"
               class="list-group-item list-group-item-action" th:href="@{/admin}">Admin</a>
            <a class="list-group-item list-group-item-action active" th:href="@{/user}">User</a>
        </div>
    </div>

    <!-- Контент -->
    <div class="content">
        <h1 class="fw-bold mb-4">User information-page</h1>

        <div class="card rounded-0 shadow-sm border">
            <div class="card-header border-bottom p-3">About user</div>
            <div class="card-body p-4 bg-white">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr class="border-top">
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${currentUser.id}">3</td>
                        <td th:text="${currentUser.name}">user</td>
                        <td th:text="${currentUser.lastName}">user</td>
                        <td th:text="${currentUser.age}">30</td>
                        <td th:text="${currentUser.email}">user@mail.ru</td>
                        <td>
                                <span th:each="role : ${currentUser.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">USER</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Правильное подключение Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
