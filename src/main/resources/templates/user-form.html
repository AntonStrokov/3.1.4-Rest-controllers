<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} != null ? 'Edit User' : 'Add User'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white text-center">
                    <h4 class="mb-0" th:text="${user.id} != null ? 'Edit User' : 'Add User'"></h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{${user.id} != null ? '/admin/update' : '/admin/add'}" method="post" th:object="${user}">
                        <input type="hidden" th:if="${user.id != null}" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <!-- Текст ошибки -->
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Age</label>
                            <input type="number" class="form-control" th:field="*{age}"
                                   th:classappend="${#fields.hasErrors('age')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   th:placeholder="${user.id != null ? 'Leave blank to keep old' : ''}"
                                   th:required="${user.id == null}" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">Roles:</label>
                            <div th:each="role : ${allRoles}" class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox"
                                       th:field="*{roles}"
                                       th:value="${role.id}"
                                       th:id="${'role_' + role.id}">
                                <label class="form-check-label" th:for="${'role_' + role.id}"
                                       th:text="${role.name}">ROLE_USER</label>
                            </div>
                            <!-- Подсказка для валидации, если ролей нет -->
                            <div class="text-danger small" th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success" th:text="${user.id} != null ? 'Update' : 'Save'"></button>
                            <a th:href="@{/admin}" class="btn btn-link text-secondary">Back to List</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
